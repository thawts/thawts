name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run tests
        run: go test ./...

      - name: Build binary (smoke check)
        run: go build -o /dev/null ./...
        if: runner.os != 'Windows'

      - name: Build binary (smoke check, Windows)
        run: go build -o nul ./...
        if: runner.os == 'Windows'

  build:
    name: Build (${{ matrix.archive }})
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: thawts
            archive: thawts-darwin-arm64.zip
          - os: ubuntu-latest
            artifact: thawts
            archive: thawts-linux-amd64.zip
          - os: ubuntu-24.04-arm
            artifact: thawts
            archive: thawts-linux-arm64.zip
          - os: windows-latest
            artifact: thawts.exe
            archive: thawts-windows-amd64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build binary
        shell: bash
        run: |
          VERSION="dev-${GITHUB_SHA::8}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o ${{ matrix.artifact }} .
        env:
          CGO_ENABLED: "1"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: zip ${{ matrix.archive }} ${{ matrix.artifact }} README.md

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path ${{ matrix.artifact }}, README.md -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}
          retention-days: 1
