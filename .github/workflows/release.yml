name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  # ── Resolve or create the tag ─────────────────────────────────────────────
  # Outputs the canonical tag (e.g. v1.2.3) so all build jobs share one value.
  prep:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${{ github.event.inputs.version }}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  # ── macOS build via GoReleaser (also creates the GitHub release) ──────────
  release-macos:
    name: Release (macOS)
    needs: prep
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prep.outputs.tag }}

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run tests
        run: go test ./...

      # TODO (WP-4.3): add macOS signing step once APPLE_* secrets are configured.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_OWNER: ${{ github.repository_owner }}
          GORELEASER_CURRENT_TAG: ${{ needs.prep.outputs.tag }}

  # ── Linux native builds ───────────────────────────────────────────────────
  release-linux:
    name: Release (Linux ${{ matrix.goarch }})
    needs: [prep, release-macos]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
          - goarch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prep.outputs.tag }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build binary
        run: |
          VERSION="${{ needs.prep.outputs.tag }}"
          go build -ldflags="-s -w -X main.version=${VERSION#v}" -o thawts .
        env:
          CGO_ENABLED: "1"

      - name: Package
        run: zip thawts_linux_${{ matrix.goarch }}.zip thawts README.md

      - name: Upload to release
        run: gh release upload ${{ needs.prep.outputs.tag }} thawts_linux_${{ matrix.goarch }}.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows native build ──────────────────────────────────────────────────
  release-windows:
    name: Release (Windows amd64)
    needs: [prep, release-macos]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prep.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build binary
        shell: bash
        run: |
          VERSION="${{ needs.prep.outputs.tag }}"
          go build -ldflags="-s -w -X main.version=${VERSION#v}" -o thawts.exe .
        env:
          CGO_ENABLED: "1"

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path thawts.exe, README.md -DestinationPath thawts_windows_amd64.zip

      - name: Upload to release
        shell: bash
        run: gh release upload ${{ needs.prep.outputs.tag }} thawts_windows_amd64.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
