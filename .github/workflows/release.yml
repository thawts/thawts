name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-macos:
    name: Release (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GoReleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run tests
        run: go test ./...

      # ── GoReleaser ────────────────────────────────────────────────────────
      # TODO (WP-4.3): add macOS signing step once APPLE_* secrets are configured.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP_OWNER: ${{ github.repository_owner }}

  # ── Linux native builds ───────────────────────────────────────────────────
  # Runs after GoReleaser has created the release, then uploads Linux zips.
  release-linux:
    name: Release (Linux ${{ matrix.goarch }})
    needs: release-macos
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
          - goarch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build binary
        run: go build -ldflags="-s -w -X main.version=${{ env.VERSION }}" -o thawts .
        env:
          CGO_ENABLED: "1"

      - name: Package
        run: zip thawts_linux_${{ matrix.goarch }}.zip thawts README.md

      - name: Upload to release
        run: gh release upload ${{ github.ref_name }} thawts_linux_${{ matrix.goarch }}.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows native build ──────────────────────────────────────────────────
  release-windows:
    name: Release (Windows amd64)
    needs: release-macos
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build binary
        run: go build -ldflags="-s -w -X main.version=${{ env.VERSION }}" -o thawts.exe .
        env:
          CGO_ENABLED: "1"

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path thawts.exe, README.md -DestinationPath thawts_windows_amd64.zip

      - name: Upload to release
        shell: bash
        run: gh release upload ${{ github.ref_name }} thawts_windows_amd64.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
