version: 2

project_name: thawts

before:
  hooks:
    - go mod tidy

builds:
  - id: thawts
    main: .
    binary: thawts
    # Inject the version string at build time.
    ldflags:
      - -s -w -X main.version={{ .Version }}
    # Wails requires CGO and native system libraries (WebKit/WebView2).
    # Cross-compilation is not supported — each platform needs its own
    # native runner. For now we build macOS only (arm64 + amd64 both work
    # on an Apple Silicon runner). Linux and Windows will be added later
    # via a matrix of native runners.
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=1
      - MACOSX_DEPLOYMENT_TARGET=12.0

# ── macOS notarization ────────────────────────────────────────────────────────
# TODO (WP-4.3): add notarize section once APPLE_* secrets are configured.
# GoReleaser v2 sign schema: certificate (base64 p12) + password fields.

archives:
  - id: thawts
    formats: [zip]
    name_template: "thawts_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto

# ── Homebrew formula (CLI/TUI binary) ─────────────────────────────────────────
# Pushes an updated Formula/thawts.rb to the tap repo after each release.
# Requires HOMEBREW_TAP_TOKEN (PAT with repo write on homebrew-tap) and
# HOMEBREW_TAP_OWNER to be set as GitHub Actions secrets.
brews:
  - name: thawts
    repository:
      owner: "{{ .Env.HOMEBREW_TAP_OWNER }}"
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://thawts.app"
    description: "Thought capture and review — CLI/TUI mode"
    license: MIT
    install: |
      bin.install "thawts"
    test: |
      system "#{bin}/thawts", "--version"
    skip_upload: '{{ if and (ne .Env.HOMEBREW_TAP_TOKEN "") (ne .Env.HOMEBREW_TAP_OWNER "") }}false{{ else }}true{{ end }}'
