version: 2

project_name: thawts

before:
  hooks:
    - go mod tidy
    # Download the AI model and native libs (embedded into the binary via -tags with_onnx).
    # The script detects the current platform automatically.
    - bash scripts/download_ai_deps.sh

builds:
  - id: thawts
    main: .
    binary: thawts
    # Inject version string and enable on-device AI inference.
    ldflags:
      - -s -w -X main.version={{ .Version }}
    tags:
      - with_onnx
    # Wails requires CGO and native system libraries.
    # Cross-compilation is not supported — each platform needs its own native runner.
    # GoReleaser handles macOS arm64 (macos-latest runner = Apple Silicon).
    # Intel Mac users can run the arm64 binary transparently via Rosetta 2.
    # Linux (amd64 + arm64) and Windows (amd64) are built by the
    # release-linux / release-windows jobs in .github/workflows/release.yml.
    goos:
      - darwin
    goarch:
      - arm64
    env:
      - CGO_ENABLED=1
      - MACOSX_DEPLOYMENT_TARGET=12.0

# ── macOS notarization ────────────────────────────────────────────────────────
# TODO (WP-4.3): add notarize section once APPLE_* secrets are configured.

archives:
  - id: thawts
    formats: [zip]
    name_template: "thawts_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  draft: false
  prerelease: auto
  replace_existing_artifacts: true

# ── Homebrew formula (CLI/TUI binary) ─────────────────────────────────────────
brews:
  - name: thawts
    repository:
      owner: "{{ .Env.HOMEBREW_TAP_OWNER }}"
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://thawts.app"
    description: "Thought capture and review — CLI/TUI mode"
    license: MIT
    install: |
      bin.install "thawts"
    test: |
      system "#{bin}/thawts", "--version"
    skip_upload: '{{ if and (ne .Env.HOMEBREW_TAP_TOKEN "") (ne .Env.HOMEBREW_TAP_OWNER "") }}false{{ else }}true{{ end }}'
